# Docker Compose for Local Production
# 使用本地构建的镜像进行测试
#
# 注意：此配置不包含 PostgreSQL，需要连接外部数据库
# 请在 .env.prod 中配置 DATABASE_URL

version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ${PROJECT_NAME:-opencode}-api:v1-local
    container_name: ${PROJECT_NAME:-opencode}-api-local
    ports:
      - "3000:3000"
    env_file:
      - 1panel.env
    restart: unless-stopped

  admin:
    image: ${PROJECT_NAME:-opencode}-admin:v1-local
    container_name: ${PROJECT_NAME:-opencode}-admin-local
    ports:
      - "8080:80"
    env_file:
      - 1panel.env
    environment:
      VITE_API_URL: http://localhost:3000/trpc
    depends_on:
      - api
    restart: unless-stopped
